<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>AI Blog Generator</title>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      font-family: 'Segoe UI', sans-serif;
      background: #0f0f1a;
      color: #e0e0e0;
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      align-items: center;
      padding: 40px 20px;
    }

    h1 {
      font-size: 2.2rem;
      background: linear-gradient(90deg, #a78bfa, #60a5fa);
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
      margin-bottom: 8px;
    }

    .subtitle {
      color: #888;
      margin-bottom: 36px;
      font-size: 0.95rem;
    }

    .card {
      background: #1a1a2e;
      border: 1px solid #2a2a4a;
      border-radius: 16px;
      padding: 32px;
      width: 100%;
      max-width: 700px;
    }

    .input-row {
      display: flex;
      gap: 12px;
    }

    input[type="text"] {
      flex: 1;
      padding: 14px 18px;
      border-radius: 10px;
      border: 1px solid #3a3a5a;
      background: #0f0f1a;
      color: #e0e0e0;
      font-size: 1rem;
      outline: none;
      transition: border 0.2s;
    }

    input[type="text"]:focus { border-color: #a78bfa; }

    button {
      padding: 14px 28px;
      border-radius: 10px;
      border: none;
      background: linear-gradient(135deg, #a78bfa, #60a5fa);
      color: #fff;
      font-size: 1rem;
      font-weight: 600;
      cursor: pointer;
      transition: opacity 0.2s;
      white-space: nowrap;
    }

    button:disabled { opacity: 0.5; cursor: not-allowed; }

    .error {
      margin-top: 14px;
      color: #f87171;
      font-size: 0.9rem;
    }

    .spinner {
      display: none;
      margin-top: 28px;
      text-align: center;
      color: #888;
    }

    .spinner.active { display: block; }

    .spinner::before {
      content: '';
      display: inline-block;
      width: 32px;
      height: 32px;
      border: 3px solid #2a2a4a;
      border-top-color: #a78bfa;
      border-radius: 50%;
      animation: spin 0.8s linear infinite;
      vertical-align: middle;
      margin-right: 10px;
    }

    @keyframes spin { to { transform: rotate(360deg); } }

    .result { display: none; margin-top: 28px; }
    .result.active { display: block; }

    .result-header {
      display: flex;
      justify-content: space-between;
      align-items: center;
      margin-bottom: 14px;
    }

    .result-title {
      font-size: 1.1rem;
      font-weight: 600;
      color: #a78bfa;
    }

    .copy-btn {
      padding: 6px 14px;
      font-size: 0.8rem;
      background: #2a2a4a;
      border-radius: 6px;
      background: transparent;
      border: 1px solid #3a3a5a;
      color: #aaa;
    }

    .copy-btn:hover { border-color: #a78bfa; color: #a78bfa; }

    .blog-content {
      background: #0f0f1a;
      border: 1px solid #2a2a4a;
      border-radius: 10px;
      padding: 20px;
      white-space: pre-wrap;
      line-height: 1.7;
      font-size: 0.95rem;
      max-height: 500px;
      overflow-y: auto;
    }
  </style>
</head>
<body>

  <h1> AI Blog Generator</h1>
  <p class="subtitle">Created by MASTHAN SHAIK</p>

  <div class="card">
    <div class="input-row">
      <input type="text" id="topicInput" placeholder="Enter a topic (e.g. Quantum Computing)" />
      <button id="generateBtn" onclick="generate()">Generate</button>
    </div>
    <div class="error" id="errorMsg"></div>

    <div class="spinner" id="spinner">Generating your blog, please wait...</div>

    <div class="result" id="result">
      <div class="result-header">
        <span class="result-title" id="resultTitle"></span>
        <div style="display:flex;gap:8px;">
          <button class="copy-btn" onclick="copyBlog()">Copy</button>
          <button class="copy-btn" onclick="downloadPDF()">⬇ PDF</button>
        </div>
      </div>
      <div class="blog-content" id="blogContent"></div>
    </div>
  </div>

  <script>
    async function generate() {
      const topic = document.getElementById("topicInput").value.trim();
      const errorMsg = document.getElementById("errorMsg");
      const spinner = document.getElementById("spinner");
      const result = document.getElementById("result");
      const btn = document.getElementById("generateBtn");

      errorMsg.textContent = "";
      result.classList.remove("active");

      if (!topic) {
        errorMsg.textContent = "Please enter a topic.";
        return;
      }

      btn.disabled = true;
      spinner.classList.add("active");

      try {
        const res = await fetch("/generate", {
          method: "POST",
          headers: { "Content-Type": "application/json" },
          body: JSON.stringify({ topic }),
        });

        const data = await res.json();

        if (!res.ok) {
          errorMsg.textContent = data.error || "Something went wrong.";
        } else {
          document.getElementById("resultTitle").textContent = `Blog: ${data.topic}`;
          document.getElementById("blogContent").textContent = data.blog;
          result.classList.add("active");
        }
      } catch (err) {
        errorMsg.textContent = "Network error. Is the server running?";
      } finally {
        btn.disabled = false;
        spinner.classList.remove("active");
      }
    }

    function copyBlog() {
      const text = document.getElementById("blogContent").textContent;
      navigator.clipboard.writeText(text).then(() => {
        const btn = document.querySelector(".copy-btn");
        btn.textContent = "Copied!";
        setTimeout(() => btn.textContent = "Copy", 2000);
      });
    }

    async function downloadPDF() {
      const topic = document.getElementById("resultTitle").textContent.replace("Blog: ", "");
      const blog = document.getElementById("blogContent").textContent;
      const res = await fetch("/download-pdf", {
        method: "POST",
        headers: { "Content-Type": "application/json" },
        body: JSON.stringify({ topic, blog }),
      });
      const blob = await res.blob();
      const url = URL.createObjectURL(blob);
      const a = document.createElement("a");
      a.href = url;
      a.download = `${topic}.pdf`;
      a.click();
      URL.revokeObjectURL(url);
    }

    document.getElementById("topicInput").addEventListener("keydown", (e) => {
      if (e.key === "Enter") generate();
    });
  </script>

</body>
</html>
